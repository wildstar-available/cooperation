<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 医疗诊断助手 - 登录</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>AI 医疗诊断助手</h1>
            <p>智能分析病情，推荐治疗方案</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <!-- 登录表单 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">登录</button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required minlength="6">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary">注册</button>
            <button type="button" class="btn btn-secondary" onclick="switchTab('login')">返回登录</button>
        </form>
    </div>

    <script>
        let token = localStorage.getItem('token');

        // 如果已登录，直接跳转
        if (token) {
            window.location.href = '/static/dashboard.html';
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab');
            const error = document.getElementById('error');

            error.style.display = 'none';

            tabs.forEach(t => t.classList.remove('active'));

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                tabs[0].classList.add('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                tabs[1].classList.add('active');
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const error = document.getElementById('error');

            try {
                const response = await fetch('/api/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/static/dashboard.html';
                } else {
                    error.textContent = data.detail || '登录失败';
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = '网络错误，请重试';
                error.style.display = 'block';
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const error = document.getElementById('error');

            if (formData.get('password') !== formData.get('confirm_password')) {
                error.textContent = '两次密码输入不一致';
                error.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: formData.get('username'),
                        password: formData.get('password')
                    })
                });

                if (response.ok) {
                    alert('注册成功！请登录');
                    switchTab('login');
                    form.reset();
                } else {
                    const data = await response.json();
                    error.textContent = data.detail || '注册失败';
                    error.style.display = 'block';
                }
            } catch (err) {
                error.textContent = '网络错误，请重试';
                error.style.display = 'block';
            }
        }
    </script>
</body>
</html>
